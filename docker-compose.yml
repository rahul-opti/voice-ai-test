services:
  postgres:
    image: postgres:16-alpine
    container_name: zeta-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: zeta-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zeta-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - model_cache:/app/src/zeta_voice/question_classification/model
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: uvicorn zeta_voice.main:app --host 0.0.0.0 --port 8000

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zeta-admin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    command: uvicorn zeta_voice.main:admin_app --host 0.0.0.0 --port 8001

volumes:
  postgres_data:
  localstack_data:
  model_cache:
